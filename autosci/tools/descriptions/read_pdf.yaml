name: read_pdf
description: Read a local PDF file and return extracted text. When the PDF contains figures, also returns paths to extracted
  image files so you can inspect them with read_file or other tools. Requires structai (MINERU_TOKEN must be set).
toolset: file
input_schema:
  type: object
  properties:
    path:
      type: string
      description: Path to the PDF file
    max_chars:
      type: integer
      description: 'Maximum characters of text to return. Default: 20000'
    max_image_paths:
      type: integer
      description: 'Maximum number of extracted image paths to list. Default: 20'
  required:
  - path
