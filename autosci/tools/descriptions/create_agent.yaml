name: create_agent
description: Create and run a custom YAML-defined agent for a specific subtask. Use this when no existing subagent fits the
  task — you can define the agent's role and tools inline, and it will be instantiated and run immediately. The agent definition
  is saved as a YAML file in the workspace for reuse.
toolset: agent
input_schema:
  type: object
  properties:
    name:
      type: string
      description: Unique name for this agent (lowercase, no spaces)
    description:
      type: string
      description: One-line description of what this agent does
    system_prompt:
      type: string
      description: Full system prompt for the agent — its role, responsibilities, and guidelines
    task:
      type: string
      description: The specific task to run the agent on
    tools:
      type: array
      items:
        type: string
      description: 'Tool names this agent may use. Available: read_file, write_file, list_dir, glob, grep, execute_command,
        web_search, web_fetch, store_memory, recall_memory'
    max_iterations:
      type: integer
      description: Max iteration budget (default 30)
  required:
  - name
  - description
  - system_prompt
  - task
