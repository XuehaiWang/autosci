name: glob
description: Find files matching a glob pattern (e.g. '**/*.py', 'src/**/*.md').
toolset: file
input_schema:
  type: object
  properties:
    pattern:
      type: string
      description: Glob pattern to match files
    path:
      type: string
      description: 'Base directory. Default: current directory'
  required:
  - pattern
